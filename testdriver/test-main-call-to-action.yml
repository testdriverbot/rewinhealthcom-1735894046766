version: 4.1.32
steps:
  - prompt: Identify the main call to action button on the homepage.
    commands:
      - command: hover-text
        text: Book a Demo
        description: main call to action button in the header
        action: click
  - prompt: Click the call to action button.
    commands:
      - command: hover-text
        text: Book a Demo
        description: main call to action button in the header
        action: click
  - prompt: >-
      Assert that the corresponding action or page loads without error.  # Use
      the content of the file from the environment
    commands:
      - command: assert
        expect: the "Book a Demo" form is visible
