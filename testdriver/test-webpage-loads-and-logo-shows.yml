version: 4.1.32
steps:
  - prompt: Open the website in the browser.
    commands:
      - command: press-keys
        keys:
          - enter
  - prompt: Assert that the webpage loads successfully.
    commands:
      - command: assert
        expect: Example Domain is visible on the page
  - prompt: >-
      Assert that the logo is displayed correctly.  # Use the content of the
      file from the environment
    commands:
      - command: assert
        expect: favicon is visible in the browser tab
